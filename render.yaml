services:
  - type: web
    name: grocery-messaging-assistant
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: db
      mountPath: /data
      sizeGB: 1
